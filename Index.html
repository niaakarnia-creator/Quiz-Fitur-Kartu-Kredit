<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Fitur Kartu Kredit - Trainee Tools by Tonia</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #0ea5e9;
    --accent2: #38bdf8;
    --gold: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(14,165,233,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(245,158,11,0.04) 0%, transparent 60%);
  }

  /* ===== SCREEN: START ===== */
  #startScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
  }
  .start-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    max-width: 480px; width: 100%;
    text-align: center;
    box-shadow: 0 0 60px rgba(14,165,233,0.08);
  }
  .logo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(14,165,233,0.1);
    border: 1px solid rgba(14,165,233,0.25);
    border-radius: 100px;
    padding: 6px 16px; font-size: 12px; font-weight: 600;
    color: var(--accent2); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 1.5rem;
  }
  .start-card h1 {
    font-size: 2rem; font-weight: 800; line-height: 1.2;
    margin-bottom: 0.6rem;
    background: linear-gradient(135deg, #e2e8f0 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .start-card p {
    color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6;
  }
  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 2rem;
  }
  .info-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px;
    font-size: 0.78rem;
  }
  .info-item strong { display: block; font-size: 1.1rem; font-weight: 700; color: var(--accent2); }

  label.field-label { display: block; text-align: left; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .name-input {
    width: 100%; padding: 12px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: inherit; font-size: 0.95rem;
    outline: none; transition: border-color .2s;
    margin-bottom: 1.2rem;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 28px; border-radius: 10px;
    font-family: inherit; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all .2s; border: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0284c7);
    color: #fff; width: 100%;
    box-shadow: 0 4px 20px rgba(14,165,233,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(14,165,233,0.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== SCREEN: QUIZ ===== */
  #quizScreen { display: none; min-height: 100vh; }

  .quiz-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,15,30,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }
  .q-counter {
    font-size: 0.8rem; font-weight: 700; color: var(--muted);
    white-space: nowrap;
  }
  .q-counter span { color: var(--accent2); font-size: 1rem; }
  .progress-bar {
    flex: 1; height: 6px;
    background: var(--border); border-radius: 100px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 100px; transition: width .4s ease;
  }
  .timer-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem; font-weight: 500; color: var(--text);
    white-space: nowrap; min-width: 64px; justify-content: center;
  }
  .timer-pill.warning { border-color: var(--gold); color: var(--gold); }
  .timer-pill.danger  { border-color: var(--danger); color: var(--danger); animation: pulse .6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .quiz-body { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem; }
  .question-num {
    font-size: 0.75rem; font-weight: 700; color: var(--accent2);
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
  }
  .question-text {
    font-size: 1.08rem; font-weight: 600; line-height: 1.55;
    margin-bottom: 1.6rem; color: var(--text);
  }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer; text-align: left;
    font-family: inherit; font-size: 0.9rem; font-weight: 500;
    color: var(--text); transition: all .18s;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(14,165,233,0.06);
  }
  .option-btn .opt-label {
    flex-shrink: 0; width: 26px; height: 26px;
    background: var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; color: var(--muted);
    transition: all .18s;
  }
  .option-btn:hover:not(:disabled) .opt-label {
    background: var(--accent); color: #fff;
  }
  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(14,165,233,0.1);
  }
  .option-btn.selected .opt-label { background: var(--accent); color: #fff; }
  .option-btn.correct {
    border-color: var(--success); background: rgba(16,185,129,0.08);
    animation: correctPop .3s ease;
  }
  .option-btn.correct .opt-label { background: var(--success); color: #fff; }
  .option-btn.wrong {
    border-color: var(--danger); background: rgba(239,68,68,0.08);
    animation: wrongShake .35s ease;
  }
  .option-btn.wrong .opt-label { background: var(--danger); color: #fff; }
  .option-btn:disabled { cursor: default; }
  @keyframes correctPop {
    0%{ transform: scale(1) } 50%{ transform: scale(1.02) } 100%{ transform: scale(1) }
  }
  @keyframes wrongShake {
    0%,100%{ transform: translateX(0) } 25%{ transform: translateX(-6px) } 75%{ transform: translateX(6px) }
  }
  .feedback-bar {
    margin-top: 12px; padding: 10px 16px;
    border-radius: 10px; font-size: 0.85rem; font-weight: 600;
    display: none; align-items: center; gap: 8px;
  }
  .feedback-bar.show { display: flex; }
  .feedback-bar.correct-fb { background: rgba(16,185,129,0.12); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
  .feedback-bar.wrong-fb   { background: rgba(239,68,68,0.12);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.2); }

  .timeout-bar {
    margin-top: 12px; padding: 10px 16px;
    border-radius: 10px; font-size: 0.85rem; font-weight: 600;
    background: rgba(245,158,11,0.12); color: var(--gold);
    border: 1px solid rgba(245,158,11,0.2);
    display: none; align-items: center; gap: 8px;
  }
  .timeout-bar.show { display: flex; }

  .nav-row { margin-top: 1.8rem; display: flex; justify-content: flex-end; gap: 10px; }
  .btn-submit {
    background: linear-gradient(135deg, var(--gold), #d97706);
    color: #fff; padding: 12px 26px; border-radius: 10px;
    font-family: inherit; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; border: none; transition: all .2s;
    box-shadow: 0 4px 16px rgba(245,158,11,0.3);
    display: none;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,158,11,0.4); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-next {
    background: linear-gradient(135deg, var(--accent), #0284c7);
    color: #fff; padding: 12px 26px; border-radius: 10px;
    font-family: inherit; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; border: none; transition: all .2s;
    box-shadow: 0 4px 16px rgba(14,165,233,0.3);
    display: none;
  }
  .btn-next:hover { transform: translateY(-2px); }

  /* ===== SCREEN: RESULT ===== */
  #resultScreen { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 2rem; }
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 3rem 2.5rem;
    max-width: 520px; width: 100%; text-align: center;
    box-shadow: 0 0 60px rgba(14,165,233,0.08);
  }
  .score-circle {
    width: 140px; height: 140px; margin: 0 auto 1.5rem;
    border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--border) 0);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .score-circle::before {
    content: ''; position: absolute; inset: 10px;
    background: var(--surface); border-radius: 50%;
  }
  .score-inner {
    position: relative; z-index: 1;
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, #e2e8f0, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .result-name { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
  .result-msg  { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.8rem; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 2rem;
  }
  .stat-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 10px;
  }
  .stat-box strong { display: block; font-size: 1.4rem; font-weight: 800; }
  .stat-box strong.s { color: var(--success); }
  .stat-box strong.d { color: var(--danger); }
  .stat-box strong.g { color: var(--gold); }
  .stat-box span { font-size: 0.72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .result-btn-row { display: flex; gap: 10px; }
  .btn-reset {
    flex: 1; padding: 13px; border-radius: 10px;
    font-family: inherit; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--text);
    transition: all .2s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div id="startScreen">
  <div class="start-card">
    <div class="logo-badge">🎓 Trainee Tools by Tonia</div>
    <h1>Quiz Fitur<br>Kartu Kredit</h1>
    <p>Uji pemahaman Anda tentang fitur-fitur Kartu Kredit BCA. Setiap soal memiliki waktu <strong>1 menit</strong>.</p>
    <div class="info-grid">
      <div class="info-item"><strong id="totalQInfo">—</strong>Jumlah Soal</div>
      <div class="info-item"><strong>60 detik</strong>Per Soal</div>
      <div class="info-item"><strong>Latihan</strong>Mode</div>
      <div class="info-item"><strong>Score</strong>Akhir Quiz</div>
    </div>
    <label class="field-label" for="nameInput">Nama Trainee</label>
    <input id="nameInput" class="name-input" type="text" placeholder="Masukkan nama Anda..." maxlength="60" />
    <button class="btn btn-primary" id="startBtn" onclick="startQuiz()" disabled>Mulai Quiz →</button>
  </div>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div id="quizScreen">
  <div class="quiz-header">
    <div class="q-counter">Soal <span id="qNum">1</span>/<span id="qTotal">—</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="timer-pill" id="timerPill">⏱ <span id="timerDisp">60</span>s</div>
  </div>
  <div class="quiz-body">
    <div class="question-num" id="qNumLabel">Soal 1</div>
    <div class="question-text" id="qText"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="feedback-bar" id="feedbackBar"></div>
    <div class="timeout-bar" id="timeoutBar">⏰ Waktu habis! Lanjut ke soal berikutnya.</div>
    <div class="nav-row">
      <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">✔ Submit</button>
      <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Selanjutnya →</button>
    </div>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="resultScreen">
  <div class="result-card">
    <div class="score-circle" id="scoreCircle">
      <div class="score-inner" id="scoreInner">—</div>
    </div>
    <div class="result-name" id="resultName"></div>
    <div class="result-msg"  id="resultMsg"></div>
    <div class="stats-grid">
      <div class="stat-box"><strong class="s" id="rCorrect">—</strong><span>Benar</span></div>
      <div class="stat-box"><strong class="d" id="rWrong">—</strong><span>Salah</span></div>
      <div class="stat-box"><strong class="g" id="rSkipped">—</strong><span>Timeout</span></div>
    </div>
    <div class="result-btn-row">
      <button class="btn btn-primary" style="flex:1" onclick="resetQuiz()">🔄 Latihan Lagi</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    q: "Fitur keamanan tambahan saat pemegang kartu melakukan transaksi pembelian di Internet dengan website adalah",
    opts: ["3D Secure","Velocity","Secure My Card","Payment Gateway"],
    ans: 0
  },
  {
    q: "Provider yang tidak support dengan fitur 3D Secure adalah",
    opts: ["Telkomsel","Axis","XL","By.u"],
    ans: 1
  },
  {
    q: "Apabila ada nasabah melakukan perubahan no hp untuk pengiriman kode OTP untuk transaksi online, berapa lama perubahan data akan efektif?",
    opts: ["H+1 hari kerja (sebelum jam 18.00)","H+1 hari kerja","H+3 hari kalender","H+3 hari kerja"],
    ans: 1
  },
  {
    q: "Berapa digit kode OTP untuk transaksi 3D Secure?",
    opts: ["8 digit","5 digit","4 digit","6 digit"],

  },
  {
    q: "Berapa kali salah OTP akan terblokir?",
    opts: ["5 kali salah","3 kali salah","6 kali salah","Tidak dapat terblokir"],
    ans: 0
  },
  {
    q: "Berapa lama Time Remaining untuk kode OTP 3D Secure?",
    opts: ["3 menit","1 menit","5 menit","2 menit"],
    ans: 2
  },
  {
    q: "Jika nasabah terima respon \"failed to deliver authorization code please click on to resend\" pada saat transaksi 3D Secure, artinya adalah",

      "OTP tidak berhasil terkirim ke HP karena HP dalam keadaan OFF (mati)",

    ans: 2
  },
  {

    ans: 2

  {

  {

  {

  },
  {

    opts: ["0.50%","0.75%","1.25%","1.75%"],

  },
  {

    ans: 3
  },
  {

  {
    q: "Dokumen yang diperlukan cabang jika nasabah melakukan transaksi cash advance di cabang adalah",

    ans: 0

  {

  {

    ans: 0
  },
  {
    q: "Berapa lama periode aktivasi setelah melakukan registrasi e-Statement?",
    opts: ["120 hari","80 hari","60 hari","30 hari"],
    ans: 3
  },
  {
    q: "Alamat email pengirim e-statement adalah",
    opts: [
      "eStatement@klikbca.co.id",
      "eStatementBCA@klikbca.com",
      "eStatement@klikbca.com",
      "halobca@bca.co.id"
    ],
    ans: 2
  },
  {
    q: "Jika mailbox CH penuh, kapan sistem akan melakukan resend email E-Statement secara otomatis?",

  {

    ans: 2
  },
  {

    ans: 3
  },
  {

  },

  startBtn.disabled = nameInput.value.trim().length === 0;
});

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  userName = nameInput.value.trim();
  if (!userName) return;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  currentQ = 0; score = 0; correctCount = 0; wrongCount = 0; timeoutCount = 0;
  shuffledQuestions = shuffleArray(QUESTIONS);
  showQuestion();
}

function showQuestion() {
  answered = false;
  selectedIdx = null;
  const q = shuffledQuestions[currentQ];

  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('qNumLabel').textContent = `Soal ${currentQ + 1} dari ${shuffledQuestions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = `${(currentQ / shuffledQuestions.length) * 100}%`;

  document.getElementById('feedbackBar').className = 'feedback-bar';
  document.getElementById('feedbackBar').textContent = '';
  document.getElementById('timeoutBar').className = 'timeout-bar';
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${LABELS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    list.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  timeLeft = 60;
  updateTimerUI();
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timer);
      onTimeout();
    }
  }, 1000);
}

function updateTimerUI() {
  const pill = document.getElementById('timerPill');
  document.getElementById('timerDisp').textContent = timeLeft;
  pill.className = 'timer-pill';
  if (timeLeft <= 10) pill.classList.add('danger');
  else if (timeLeft <= 20) pill.classList.add('warning');
}

function onTimeout() {
  if (answered) return;
  answered = true;
  selectedIdx = null;
  timeoutCount++;
  disableOptions();
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  const tb = document.getElementById('timeoutBar');
  tb.className = 'timeout-bar show';
  // Auto-advance after 1.5 seconds
  setTimeout(() => {
    nextQuestion();
  }, 1500);
}

function selectAnswer(idx) {
  if (answered) return;
  selectedIdx = idx;
  // highlight selected, clear others
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  document.getElementById('submitBtn').style.display = 'inline-flex';
}

function submitAnswer() {
  if (answered || selectedIdx === null) return;
  answered = true;
  clearInterval(timer);

  const q = shuffledQuestions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => { b.disabled = true; b.classList.remove('selected'); });

  const fb = document.getElementById('feedbackBar');
  if (selectedIdx === q.ans) {
    btns[selectedIdx].classList.add('correct');
    correctCount++;
    score++;
    fb.className = 'feedback-bar correct-fb show';
    fb.innerHTML = '✅ Jawaban Benar!';
  } else {
    btns[selectedIdx].classList.add('wrong');
    wrongCount++;
    fb.className = 'feedback-bar wrong-fb show';
    fb.innerHTML = '❌ Jawaban Salah.';
  }

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-flex';
  document.getElementById('nextBtn').textContent =
    currentQ < shuffledQuestions.length - 1 ? 'Selanjutnya →' : 'Lihat Hasil';
}

function disableOptions() {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= shuffledQuestions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  clearInterval(timer);
  document.getElementById('quizScreen').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.style.display = 'flex';

  const pct = Math.round((correctCount / shuffledQuestions.length) * 100);
  document.getElementById('scoreCircle').style.setProperty('--pct', pct);
  document.getElementById('scoreInner').textContent = `${pct}%`;
  document.getElementById('resultName').textContent = userName;
  document.getElementById('rCorrect').textContent = correctCount;
  document.getElementById('rWrong').textContent = wrongCount;
  document.getElementById('rSkipped').textContent = timeoutCount;

  let msg = '';
  if (pct >= 90) msg = '🏆 Luar biasa! Penguasaan materi sangat baik.';
  else if (pct >= 75) msg = '🎯 Bagus! Terus tingkatkan pemahaman Anda.';
  else if (pct >= 60) msg = '📚 Cukup baik. Perlu lebih banyak latihan.';
  else msg = '💪 Semangat! Pelajari kembali materi dan coba lagi.';
  document.getElementById('resultMsg').textContent = msg;
}

function resetQuiz() {
  clearInterval(timer);
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('nameInput').value = '';
  document.getElementById('startBtn').disabled = true;
}
</script>
</body>
</html>
